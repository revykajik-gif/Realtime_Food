services:
  postgres:
    image: postgres:16
    container_name: realtime_postgres
    restart: always
    environment:
      POSTGRES_USER: delivery_user
      POSTGRES_PASSWORD: delivery_pass
      POSTGRES_DB: delivery_realtime
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: realtime_backend
    depends_on:
      - postgres
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://delivery_user:delivery_pass@postgres:5432/delivery_realtime?schema=public
      JWT_SECRET: replace-with-a-long-random-secret
      CLIENT_URL: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
